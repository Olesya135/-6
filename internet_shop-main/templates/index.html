{% extends "base.html" %}
{% block content %}
<h1>Каталог товаров</h1>
<div class="products">
    {% for product in products %}
    <div class="product-card">
        <h3>{{ product.name }}</h3>
        <p>{{ product.description }}</p>
        <p>Цена: {{ product.price }} руб.</p>
        <p>В наличии: {{ product.stock }}</p>
        <a href="{{ url_for('add_to_cart', product_id=product.id) }}">Добавить в корзину</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
